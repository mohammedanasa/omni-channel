services:
  - type: web
    name: omni-channel-api
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: django_tenants.postgresql_backend
      - key: DB_NAME
        sync: false  # Set manually from Neon
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: EMAIL_HOST
        value: localhost
      - key: EMAIL_PORT
        value: "1025"
      - key: EMAIL_HOST_USER
        value: ""
      - key: EMAIL_HOST_PASSWORD
        value: ""
      - key: EMAIL_USE_TLS
        value: "False"
